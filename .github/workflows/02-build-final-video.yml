name: 02 - Build final narrated video

on:
  workflow_run:
    workflows:
      - 01 - Generate narration MP3
    types:
      - completed
  workflow_dispatch:
    inputs:
      narration_run_id:
        description: Optional successful run ID of workflow 01; leave blank to use the latest successful run
        required: false
        type: string

permissions:
  actions: read
  contents: read

jobs:
  build:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Resolve narration workflow run
        id: narration_run
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          AUTOMATIC_RUN_ID: ${{ github.event.workflow_run.id }}
          MANUAL_RUN_ID: ${{ inputs.narration_run_id }}
        run: |
          if [ "$EVENT_NAME" = "workflow_run" ]; then
            RUN_ID="$AUTOMATIC_RUN_ID"
          elif [ -n "$MANUAL_RUN_ID" ]; then
            RUN_ID="$MANUAL_RUN_ID"
          else
            RUN_ID=$(gh run list \
              --workflow 01-generate-narration.yml \
              --status success \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId')
          fi
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "No successful narration workflow run was found." >&2
            exit 1
          fi
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Download narration artifact
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ steps.narration_run.outputs.run_id }}
        run: |
          mkdir -p artifacts
          gh run download "$RUN_ID" \
            --name narration-audio \
            --dir artifacts
          test -f artifacts/narration.mp3

      - name: Build final MP4
        run: |
          python scripts/build_final_video.py \
            --video assets/aerochef_demo_compressed.mp4 \
            --narration artifacts/narration.mp3 \
            --output output/aerochef_demo_with_narration.mp4

      - name: Upload final video artifact
        uses: actions/upload-artifact@v4
        with:
          name: aerochef-final-video
          path: output/aerochef_demo_with_narration.mp4
          if-no-files-found: error
          compression-level: 0
